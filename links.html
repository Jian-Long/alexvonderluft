<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFD5E3">
  <meta name="description" content="Find Alex Vonderluft across social platforms and private spaces.">
  <title>Links — Alex Vonderluft</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell narrow page-enter">
    <header class="links-header reveal">
      <p class="eyebrow">Across platforms</p>
      <h1 class="brand-name">Alex Vonderluft</h1>
      <p class="lede">Choose where we meet.</p>
    </header>

    <p class="section-label reveal" id="private-label">Private</p>
    <section class="link-list" aria-labelledby="private-label">
      <a class="panel link-card track-link reveal stagger-item" style="--stagger: 0" href="https://t.me/+VtJzLyitRzY2ZGEy" data-target="telegram" target="_blank" rel="noopener noreferrer" aria-label="Open Alex's Telegram in a new tab">
        <div><h2 class="link-title">Telegram</h2><p class="link-desc">Inner circle</p></div>
        <span class="link-thumb"><img src="tg.png" alt="" width="400" height="400"></span>
        <span class="action-arrow" aria-hidden="true">→</span>
      </a>
      <a class="panel link-card link-card--featured track-link reveal stagger-item" style="--stagger: 1" href="archive.html" data-target="exclusive" aria-label="Enter Alex's exclusive private archive">
        <div><h2 class="link-title">Exclusive</h2><p class="link-desc">Private archive · members only</p></div>
        <span class="link-thumb"><img src="of.png" alt="" width="400" height="400"></span>
        <span class="action-arrow" aria-hidden="true">→</span>
      </a>
    </section>

    <p class="section-label reveal" id="public-label">Public</p>
    <section class="link-list" aria-labelledby="public-label">
      <a class="panel link-card track-link reveal stagger-item" style="--stagger: 0" href="https://instagram.com/alexvonderluft" data-target="instagram" target="_blank" rel="noopener noreferrer" aria-label="Open Alex's Instagram in a new tab">
        <div><h2 class="link-title">Instagram</h2><p class="link-desc">Stories, looks and nights out</p></div>
        <span class="link-thumb"><img src="ig.jpg" alt="" width="512" height="512" loading="lazy"></span>
        <span class="action-arrow" aria-hidden="true">→</span>
      </a>
      <a class="panel link-card track-link reveal stagger-item" style="--stagger: 1" href="https://snapchat.com/add/alexinfur" data-target="snapchat" target="_blank" rel="noopener noreferrer" aria-label="Open Alex's Snapchat in a new tab">
        <div><h2 class="link-title">Snapchat</h2><p class="link-desc">Right now</p></div>
        <span class="link-thumb"><img src="snap.png" alt="" width="400" height="400" loading="lazy"></span>
        <span class="action-arrow" aria-hidden="true">→</span>
      </a>
    </section>

    <p class="section-label reveal" id="support-label">Support</p>
    <section class="link-list" aria-labelledby="support-label">
      <a class="panel link-card track-link reveal" href="https://wishlist.de/w/alexvonderluft" data-target="wishlist" target="_blank" rel="noopener noreferrer" aria-label="Open Alex's wishlist in a new tab">
        <div><h2 class="link-title">Wishlist</h2><p class="link-desc">Send a surprise</p></div>
        <span class="link-thumb"><img src="wishlist.jpeg" alt="" width="1086" height="1086" loading="lazy"></span>
        <span class="action-arrow" aria-hidden="true">→</span>
      </a>
    </section>
    <a class="text-link page-back reveal" href="index.html" id="backLink">Back home</a>
  </main>
  <script src="site.js"></script>
  <script>
    alexSite.hit("page-links");
    alexSite.hit("source-" + alexSite.source + "__page-links");
    document.getElementById("backLink").href = alexSite.internalUrl("index.html");
    document.querySelectorAll(".track-link").forEach(link => {
      if (link.getAttribute("href") === "archive.html") link.href = alexSite.internalUrl("archive.html");
      link.addEventListener("click", () => {
        const target = link.dataset.target || "unknown";
        alexSite.hit("click-" + target);
        alexSite.hit("source-" + alexSite.source + "__click-" + target);
      });
    });
  </script>
</body>
</html>
