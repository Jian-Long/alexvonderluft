<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Vonderluft</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#e7dfea" />
  <style>
    :root {
      --bg: #e9e1ec;
      --text: #111111;
      --muted: rgba(17, 17, 17, 0.46);
      --line: rgba(17, 17, 17, 0.08);
      --card: rgba(255, 255, 255, 0.58);
      --card-2: rgba(255, 255, 255, 0.72);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      padding: 28px 16px 36px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .name {
      font-size: 20px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .sub {
      margin-top: 8px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: center;
      gap: 14px;
      min-height: 92px;
      padding: 14px 14px 14px 18px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      background: var(--card-2);
    }

    .card:active {
      transform: scale(0.985);
    }

    .meta {
      min-width: 0;
    }

    .title {
      font-size: 24px;
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 600;
      margin: 0;
    }

    .desc {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .thumb {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
      background: rgba(255,255,255,0.7);
      justify-self: end;
      flex-shrink: 0;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(17, 17, 17, 0.42);
    }

    @media (min-width: 768px) {
      body {
        padding-top: 40px;
      }

      .wrap {
        max-width: 460px;
      }

      .name {
        font-size: 22px;
      }

      .card {
        min-height: 96px;
        padding-left: 20px;
      }

      .title {
        font-size: 26px;
      }

      .thumb {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1 class="name">Alex Vonderluft</h1>
      <div class="sub">Access</div>
    </header>

    <section class="list">
  <a class="card track-link"
     href="https://instagram.com/alexvonderluft"
     data-target="instagram"
     target="_blank"
     rel="noopener noreferrer">
    <div class="meta">
      <div class="title">Instagram</div>
      <div class="desc">public</div>
    </div>
    <div class="thumb">
      <img src="ig.jpg" alt="Instagram" />
    </div>
  </a>

  <a class="card track-link"
     href="https://snapchat.com/add/alexinfur"
     data-target="snapchat"
     target="_blank"
     rel="noopener noreferrer">
    <div class="meta">
      <div class="title">Snapchat</div>
      <div class="desc">right now</div>
    </div>
    <div class="thumb">
      <img src="snap.jpg" alt="Snapchat" />
    </div>
  </a>

  <a class="card track-link"
     href="https://t.me/+VtJzLyitRzY2ZGEy"
     data-target="telegram"
     target="_blank"
     rel="noopener noreferrer">
    <div class="meta">
      <div class="title">Telegram</div>
      <div class="desc">closer</div>
    </div>
    <div class="thumb">
      <img src="tg.jpg" alt="Telegram" />
    </div>
  </a>

  <a class="card track-link"
     href="archive.html"
     data-target="exclusive">
    <div class="meta">
      <div class="title">Exclusive</div>
      <div class="desc">private side</div>
    </div>
    <div class="thumb">
      <img src="of.jpg" alt="Exclusive" />
    </div>
  </a>
</section>

    <a class="back" href="index.html">Back</a>
  </main>

  <script>
    const NS = "alexvonderluft_site";
    const params = new URLSearchParams(window.location.search);
    const src = params.get("src") || "direct";

    function hit(key) {
      const url = "https://api.countapi.xyz/hit/" + NS + "/" + encodeURIComponent(key);
      fetch(url, { mode: "no-cors", keepalive: true }).catch(() => {});
    }

    hit("page-links");
    hit("source-" + src + "__page-links");

    document.querySelectorAll(".track-link").forEach(function(link) {
      link.addEventListener("click", function(e) {
        e.preventDefault();

        const target = link.dataset.target || "unknown";
        hit("click-" + target);
        hit("source-" + src + "__click-" + target);

        const href = link.getAttribute("href");

        if (href === "archive.html") {
          const next = new URL("archive.html", window.location.href);
          next.searchParams.set("src", src);

          setTimeout(function () {
            window.location.href = next.toString();
          }, 120);
        } else {
          setTimeout(function () {
            window.open(href, "_blank", "noopener");
          }, 120);
        }
      });
    });
  </script>
</body>
</html>
