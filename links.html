<!-- links.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Vonderluft</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#e7dfea" />

  <style>
    :root {
      --bg:#e9e1ec;
      --text:#111111;
      --muted:rgba(17,17,17,.46);
      --line:rgba(17,17,17,.08);
      --card:rgba(255,255,255,.58);
      --card-2:rgba(255,255,255,.74);
      --exclusive:rgba(255,255,255,.90);
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --shadow-strong:0 18px 48px rgba(0,0,0,.12);
      --radius:26px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body{
      min-height:100svh;
      padding:28px 16px 36px;
    }

    .wrap{
      width:100%;
      max-width:430px;
      margin:0 auto;
    }

    .header{
      text-align:center;
      margin-bottom:24px;
    }

    .name{
      font-size:22px;
      line-height:1;
      font-weight:650;
      letter-spacing:-.05em;
      margin:0;
    }

    .community{
      margin-top:8px;
      font-size:12px;
      color:rgba(17,17,17,.52);
      letter-spacing:.04em;
    }

    .sub{
      margin-top:8px;
      font-size:10px;
      line-height:1;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .section-label{
      margin:20px 0 9px 4px;
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(17,17,17,.38);
    }

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      display:grid;
      grid-template-columns:1fr 54px;
      align-items:center;
      gap:14px;
      min-height:92px;
      padding:14px 14px 14px 18px;
      border-radius:var(--radius);
      background:var(--card);
      border:1px solid rgba(255,255,255,.42);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      text-decoration:none;
      color:inherit;
      transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .card:hover{
      transform:translateY(-2px);
      background:var(--card-2);
    }

    .card:active{
      transform:scale(.985);
    }

    .exclusive-card{
      position:relative;
      min-height:124px;
      grid-template-columns:1fr 74px;
      background:var(--exclusive);
      box-shadow:var(--shadow-strong);
      border:1px solid rgba(255,255,255,.72);
      overflow:hidden;
    }

    .exclusive-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.9), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,.5), transparent);
      pointer-events:none;
    }

    .exclusive-card:hover{
      transform:translateY(-5px);
      background:#fff;
      box-shadow:0 22px 56px rgba(0,0,0,.15);
    }

    .meta{
      min-width:0;
      position:relative;
      z-index:2;
    }

    .title{
      font-size:24px;
      line-height:.95;
      letter-spacing:-.055em;
      font-weight:650;
      margin:0;
    }

    .exclusive-card .title{
      font-size:30px;
    }

    .desc{
      margin-top:8px;
      font-size:12px;
      line-height:1.2;
      color:var(--muted);
      letter-spacing:.02em;
    }

    .exclusive-card .desc{
      font-size:13px;
      color:rgba(17,17,17,.55);
    }

    .extra{
      margin-top:8px;
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(17,17,17,.42);
    }

    .thumb{
      width:54px;
      height:54px;
      border-radius:50%;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.10);
      background:rgba(255,255,255,.7);
      justify-self:end;
      flex-shrink:0;
      position:relative;
      z-index:2;
    }

    .exclusive-card .thumb{
      width:74px;
      height:74px;
      box-shadow:0 10px 28px rgba(0,0,0,.16);
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .badge{
      position:absolute;
      top:14px;
      right:14px;
      z-index:3;
      height:24px;
      padding:0 10px;
      border-radius:999px;
      background:#111;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .back{
      display:block;
      text-align:center;
      margin-top:22px;
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      text-decoration:none;
      color:rgba(17,17,17,.42);
    }

    @media (min-width:768px){
      body{
        padding-top:40px;
      }

      .wrap{
        max-width:460px;
      }

      .card{
        min-height:96px;
        padding-left:20px;
      }

      .title{
        font-size:26px;
      }

      .thumb{
        width:58px;
        height:58px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="header">
      <h1 class="name">Alex Vonderluft</h1>
      <div class="community">community across platforms</div>
      <div class="sub">Access</div>
    </header>

    <div class="section-label">Private</div>

    <section class="list">
      <a class="card track-link"
         href="https://t.me/+VtJzLyitRzY2ZGEy"
         data-target="telegram"
         target="_blank"
         rel="noopener noreferrer">
        <div class="meta">
          <div class="title">Telegram</div>
          <div class="desc">inner circle</div>
        </div>
        <div class="thumb">
          <img src="tg.png" alt="Telegram" />
        </div>
      </a>

      <a class="card exclusive-card track-link"
         href="archive.html"
         data-target="exclusive">
        <div class="badge">VIP</div>
        <div class="meta">
          <div class="title">Exclusive</div>
          <div class="desc">private archive</div>
          <div class="extra">members only</div>
        </div>
        <div class="thumb">
          <img src="of.png" alt="Exclusive" />
        </div>
      </a>
    </section>

    <div class="section-label">Public</div>

    <section class="list">
      <a class="card track-link"
         href="https://instagram.com/alexvonderluft"
         data-target="instagram"
         target="_blank"
         rel="noopener noreferrer">
        <div class="meta">
          <div class="title">Instagram</div>
          <div class="desc">public</div>
        </div>
        <div class="thumb">
          <img src="ig.jpg" alt="Instagram" />
        </div>
      </a>

      <a class="card track-link"
         href="https://snapchat.com/add/alexinfur"
         data-target="snapchat"
         target="_blank"
         rel="noopener noreferrer">
        <div class="meta">
          <div class="title">Snapchat</div>
          <div class="desc">right now</div>
        </div>
        <div class="thumb">
          <img src="snap.png" alt="Snapchat" />
        </div>
      </a>
    </section>

    <div class="section-label">Support</div>

    <section class="list">
      <a class="card track-link"
         href="https://wishlist.de/w/alexvonderluft"
         data-target="wishlist"
         target="_blank"
         rel="noopener noreferrer">
        <div class="meta">
          <div class="title">Wishlist</div>
          <div class="desc">send a surprise</div>
        </div>
        <div class="thumb">
          <img src="wishlist.jpeg" alt="Wishlist" />
        </div>
      </a>
    </section>

    <a class="back" href="index.html">Back</a>
  </main>

  <script>
    const NS = "alexvonderluft_site";
    const params = new URLSearchParams(window.location.search);
    const src = params.get("src") || "direct";

    function hit(key) {
      const url = "https://api.countapi.xyz/hit/" + NS + "/" + encodeURIComponent(key);
      fetch(url, { mode: "no-cors", keepalive: true }).catch(() => {});
    }

    hit("page-links");
    hit("source-" + src + "__page-links");

    document.querySelectorAll(".track-link").forEach(function(link) {
      link.addEventListener("click", function(e) {
        e.preventDefault();

        const target = link.dataset.target || "unknown";
        hit("click-" + target);
        hit("source-" + src + "__click-" + target);

        const href = link.getAttribute("href");

        if (href === "archive.html") {
          const next = new URL("archive.html", window.location.href);
          next.searchParams.set("src", src);

          setTimeout(function () {
            window.location.href = next.toString();
          }, 120);
        } else {
          setTimeout(function () {
            window.open(href, "_blank", "noopener");
          }, 120);
        }
      });
    });
  </script>
</body>
</html>
