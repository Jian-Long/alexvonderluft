<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Vonderluft</title>

<style>
body{
  margin:0;
  font-family: Inter, Helvetica, Arial, sans-serif;
  background: #ece6f2;
  color:#111;
  display:flex;
  justify-content:center;
  padding:24px;
}

.wrap{
  width:100%;
  max-width:420px;
}

/* HEADER */

.header{
  text-align:center;
  margin-bottom:24px;
}

.name{
  font-size:28px;
  letter-spacing:-0.04em;
  font-weight:600;
}

.sub{
  margin-top:6px;
  font-size:13px;
  color:rgba(0,0,0,0.6);
}

/* LINKS */

.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px;
  border-radius:20px;
  background:white;
  margin-bottom:12px;
  text-decoration:none;
  color:inherit;
  transition:0.2s;
}

.card:active{
  transform:scale(0.97);
}

.title{
  font-size:16px;
  font-weight:600;
}

.desc{
  font-size:12px;
  color:rgba(0,0,0,0.6);
  margin-top:4px;
}

.arrow{
  font-size:18px;
}

/* BACK */

.back{
  margin-top:14px;
  font-size:11px;
  text-align:center;
  display:block;
  text-decoration:none;
  color:rgba(0,0,0,0.5);
  letter-spacing:0.15em;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <div class="name">Alex Vonderluft</div>
    <div class="sub">a little closer</div>
  </div>

  <a class="card" href="https://instagram.com/alexvonderluft">
    <div>
      <div class="title">Instagram</div>
      <div class="desc">public side</div>
    </div>
    <div class="arrow">↗</div>
  </a>

  <a class="card" href="https://snapchat.com/add/alexinfur">
    <div>
      <div class="title">Snapchat</div>
      <div class="desc">right now</div>
    </div>
    <div class="arrow">↗</div>
  </a>

  <a class="card" href="https://t.me/+VtJzLyitRzY2ZGEy">
    <div>
      <div class="title">Telegram</div>
      <div class="desc">closer than anywhere else</div>
    </div>
    <div class="arrow">↗</div>
  </a>

  <a class="card" href="https://onlyfans.com/alexvonderluft">
    <div>
      <div class="title">exclusive</div>
      <div class="desc">private side</div>
    </div>
    <div class="arrow">↗</div>
  </a>

  <a href="index.html" class="back">back</a>

</div>

</body>
</html>
