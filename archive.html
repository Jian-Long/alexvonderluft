<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFD5E3">
  <meta name="robots" content="noindex, nofollow">
  <title>Archive — Alex Vonderluft</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ritual-page" data-analytics-banner="off">
  <main class="panel ritual-card page-enter">
    <p class="eyebrow">Private archive</p>
    <h1 class="brand-name">Restricted.</h1>
    <p class="lede">Some things stay a little further in.</p>
    <div class="ritual-actions">
      <a class="button" id="continueBtn" href="http://alexvonderluft.de" target="_blank" rel="noopener noreferrer"
         data-track-event="archive_open" data-platform="onlyfans" data-position="archive" data-link-name="archive_continue" data-destination-type="exclusive">Continue <span aria-hidden="true">→</span></a>
      <a class="button button--secondary" id="backBtn" href="links.html" data-track-event="internal_navigation" data-position="archive" data-link-name="archive_back" data-destination-type="internal">Back</a>
    </div>
    <p class="countdown" id="countdown" aria-live="polite">Opening automatically…</p>
  </main>
  <script src="site.js"></script>
  <script src="analytics.js"></script>
  <script>
    const destination = "http://alexvonderluft.de";
    document.getElementById("backBtn").href = alexSite.internalUrl("links.html");
    window.setTimeout(() => {
      alexAnalytics.trackEvent("archive_open", { trigger: "automatic", platform: "onlyfans", link_position: "archive", destination_type: "exclusive", destination_domain: "alexvonderluft.de" });
      window.location.href = destination;
    }, 1800);
  </script>
</body>
</html>
