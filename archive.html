<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFD5E3">
  <meta name="robots" content="noindex, nofollow">
  <title>Archive — Alex Vonderluft</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ritual-page">
  <main class="panel ritual-card">
    <p class="eyebrow">Private archive</p>
    <h1 class="brand-name">Restricted.</h1>
    <p class="lede">Some things stay a little further in.</p>
    <div class="ritual-actions">
      <a class="button" id="continueBtn" href="http://alexvonderluft.de" target="_blank" rel="noopener noreferrer">Continue <span aria-hidden="true">→</span></a>
      <a class="button button--secondary" id="backBtn" href="links.html">Back</a>
    </div>
    <p class="countdown" id="countdown" aria-live="polite">Opening automatically…</p>
  </main>
  <script src="site.js"></script>
  <script>
    const destination = "http://alexvonderluft.de";
    alexSite.hit("page-archive");
    alexSite.hit("source-" + alexSite.source + "__page-archive");
    document.getElementById("backBtn").href = alexSite.internalUrl("links.html");
    document.getElementById("continueBtn").addEventListener("click", () => {
      alexSite.hit("click-continue");
      alexSite.hit("source-" + alexSite.source + "__click-continue");
    });
    window.setTimeout(() => {
      alexSite.hit("auto-redirect");
      alexSite.hit("source-" + alexSite.source + "__auto-redirect");
      window.location.href = destination;
    }, 1800);
  </script>
</body>
</html>
